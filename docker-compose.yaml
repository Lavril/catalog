services:
  db:
    image: postgres:17.4
    volumes:
      - pg-data-catalog:/var/lib/postgresql/data
    container_name: catalog_db
    ports:
      - "5432:5432"
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: catalog_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  pg-data-catalog:
